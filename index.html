const isConfigured = () => JSONBIN_MASTER_KEY && JSONBIN_BIN_ID;

async function dbRead() {
  if (!isConfigured()) return null;
  const res = await fetch(`${JSONBIN_BASE}/${JSONBIN_BIN_ID}/latest`, {
    headers: { "X-Master-Key": JSONBIN_MASTER_KEY }
  });
  if (!res.ok) throw new Error("DB read failed: " + res.status);
  const data = await res.json();
  return data.record;
}

async function dbWrite(record) {
  if (!isConfigured()) return;
  const res = await fetch(`${JSONBIN_BASE}/${JSONBIN_BIN_ID}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json", "X-Master-Key": JSONBIN_MASTER_KEY },
    body: JSON.stringify(record)
  });
  if (!res.ok) throw new Error("DB write failed: " + res.status);
  return res.json();
}

function App() {
  const [configured, setConfigured] = useState(true);
  const [masterKey, setMasterKey] = useState("");
  const [binId, setBinId] = useState("");

  const [view, setView]               = useState("home");
  const [playerName, setPlayerName]   = useState("");
  const [nameInput, setNameInput]     = useState("");
  const [picks, setPicks]             = useState({});
  const [db, setDb]                   = useState(emptyDB()); // shared state
  const [adminPass, setAdminPass]     = useState("");
  const [adminUnlocked, setAdminUnlocked] = useState(false);
  const [notification, setNotification]   = useState(null);
  const [venmoGate, setVenmoGate]         = useState(null);
  const [syncing, setSyncing]             = useState(false);
  const [lastSync, setLastSync]           = useState(null);
  const [autoFetch, setAutoFetch]         = useState(false);
  const [fetchStatus, setFetchStatus]     = useState("idle");
  const pollRef   = useRef(null);
  const syncRef   = useRef(null);
  const oscarClicks = useRef(0);
  const oscarTimer  = useRef(null);

  // Credentials hardcoded - set globals immediately (not in useEffect)
  window.JSONBIN_MASTER_KEY = JSONBIN_MASTER_KEY;
  window.JSONBIN_BIN_ID = JSONBIN_BIN_ID;

  const saveConfig = (k, b) => {
    localStorage.setItem("malibu_key", k);
    localStorage.setItem("malibu_bin", b);
    window.JSONBIN_MASTER_KEY = k;
    window.JSONBIN_BIN_ID = b;
    setMasterKey(k); setBinId(b); setConfigured(true);
  };

  // ── DB helpers using current config ───────────────────────────────────────
  const readDB = useCallback(async () => {
    const k = window.JSONBIN_MASTER_KEY, b = window.JSONBIN_BIN_ID;
    if (!k || !b) return null;
    const res = await fetch(`https://api.jsonbin.io/v3/b/${b}/latest`, {
      headers: { "X-Master-Key": k }
    });
    if (!res.ok) throw new Error("read " + res.status);
    const data = await res.json();
    return data.record;
  }, []);

  const writeDB = useCallback(async (record) => {
    const k = window.JSONBIN_MASTER_KEY, b = window.JSONBIN_BIN_ID;
    if (!k || !b) return;
    const res = await fetch(`https://api.jsonbin.io/v3/b/${b}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json", "X-Master-Key": k },
      body: JSON.stringify(record)
    });
    if (!res.ok) {
      const errText = await res.text();
      throw new Error("write " + res.status + ": " + errText);
    }
    return res.json();
  }, []);

  // ── Polling: sync from DB every 15s ──────────────────────────────────────
  const syncFromDB = useCallback(async () => {
    try {
      const record = await readDB();
      if (record) {
        setDb(record);
        setLastSync(new Date());
      }
    } catch(e) { console.warn("Sync failed:", e); }
  }, [readDB]);

  useEffect(() => {
    if (!configured) return;
    syncFromDB(); // initial load
    pollRef.current = setInterval(syncFromDB, 15000); // poll every 15s
    return () => clearInterval(pollRef.current);
  }, [configured, syncFromDB]);

  // ── Notifications ─────────────────────────────────────────────────────────
  const showNotif = (msg, type="success") => {
    setNotification({msg,type});
    setTimeout(()=>setNotification(null), 3000);
  };

  // ── Save ballot to shared DB ──────────────────────────────────────────────
  const saveBallot = async () => {
    if (!playerName) return;
    setSyncing(true);
    try {
      const fresh = await readDB() || emptyDB();
      fresh.ballots[playerName] = picks;
      await writeDB(fresh);
      setDb(fresh);
      showNotif(playerName + "'s ballot saved! ✓");
    } catch(e) {
      console.error("Save error:", e);
      showNotif("Save failed: " + e.message, "error");
    }
    setSyncing(false);
  };

  // ── Venmo + start ballot ──────────────────────────────────────────────────
  const handleStart = async (name) => {
    if (!name) return;
    const alreadyIn = db.ballots[name] || db.paid[name];
    if (alreadyIn) {
      setPicks(db.ballots[name] || {});
      setPlayerName(name);
      setView("ballot");
    } else {
      setVenmoGate(name);
    }
  };

  const handleVenmoConfirmed = async () => {
    const name = venmoGate;
    setSyncing(true);
    try {
      const fresh = await readDB() || emptyDB();
      fresh.paid[name] = true;
      await writeDB(fresh);
      setDb(fresh);
    } catch(e) {}
    setSyncing(false);
    setPicks({}); setPlayerName(name); setVenmoGate(null); setView("ballot");
    showNotif("Payment confirmed! Welcome, " + name + " 🎬");
  };

  // ── Save winners (admin) ──────────────────────────────────────────────────
  const saveWinners = async (newWinners) => {
    setSyncing(true);
    try {
      const fresh = await readDB() || emptyDB();
      fresh.winners = newWinners;
      await writeDB(fresh);
      setDb(fresh);
      showNotif("Winners saved! ✓");
    } catch(e) {
      showNotif("Save failed — check connection", "error");
    }
    setSyncing(false);
  };

  // ── Live auto-fetch winners via Claude API ────────────────────────────────
  const fetchLiveWinners = useCallback(async () => {
    setFetchStatus("fetching");
    try {
      const proxy = "https://api.allorigins.win/get?url=";
      const target = encodeURIComponent("https://abc7.com/live-updates/oscars-2026-live-updates-see-winners-best-moments-98th-academy-awards-hollywood/18673293/");
      const res = await fetch(proxy + target);
      const data = await res.json();
      const rawHtml = data.contents || "";
      const text = rawHtml
        .replace(/<[^>]+>/g, " ")
        .replace(/\s+/g, " ")
        .replace(/&quot;/g, '"')
        .replace(/&#39;/g, "'")
        .replace(/&amp;/g, "&")
        .replace(/\u201c|\u201d/g, '"');

      const fresh = await readDB() || emptyDB();
      let newCount = 0;

      // ABC7 uses the exact pattern:
      // "[Person] has won the Oscar for Best [Category] for "[Film]" at the 2026 Academy Awards"
      // We split into sentences and look for "has won the Oscar for"
      const sentences = text.split(/(?<=[.!?])\s+/);
      sentences.forEach(sentence => {
        const s = sentence.toLowerCase();
        if (!s.includes("has won the oscar for") && !s.includes("have won the oscar for")) return;

        // Find which of our nominees' films appears in this sentence
        CATEGORIES.forEach(cat => {
          if (fresh.winners[cat.id]) return; // already have it
          if (cat.id === "picture") return; // Best Picture is always last — enter manually

          const matched = cat.nominees.find(nom => {
            const filmName = nom.split(" \u2014 ")[0]
              .replace(/^"/, "").replace(/"$/, "").toLowerCase().trim();
            if (filmName.length < 3) return false;
            // Must appear in the sentence
            if (!s.includes(filmName)) return false;
            // Also verify the category is mentioned somewhere in the sentence
            const catKeywords = cat.name.toLowerCase()
              .replace("writing ", "").replace("music ", "")
              .replace("actor in a ", "").replace("actress in a ", "")
              .split(" ").filter(w => w.length > 4);
            return catKeywords.some(kw => s.includes(kw));
          });

          if (matched) {
            fresh.winners[cat.id] = matched;
            newCount++;
          }
        });
      });

      await writeDB(fresh);
      setDb(fresh);
      setLastSync(new Date());
      setFetchStatus("done");
      if (newCount > 0) {
        showNotif("🏆 " + newCount + " new winner" + (newCount > 1 ? "s" : "") + " updated!");
      } else {
        showNotif("✓ Checked — no new winners yet");
      }
    } catch(e) {
      console.error("Live fetch error:", e.message);
      setFetchStatus("error");
      setTimeout(() => setFetchStatus("idle"), 5000);
    }
  }, [readDB, writeDB]);


  useEffect(() => {
    if (autoFetch) {
      fetchLiveWinners();
      syncRef.current = setInterval(fetchLiveWinners, 3*60*1000);
    } else {
      if (syncRef.current) clearInterval(syncRef.current);
      setFetchStatus("idle");
    }
    return () => { if (syncRef.current) clearInterval(syncRef.current); };
  }, [autoFetch]);

  // ── Triple-click Oscar → admin ────────────────────────────────────────────
  const handleOscarClick = () => {
    oscarClicks.current += 1;
    if (oscarTimer.current) clearTimeout(oscarTimer.current);
    if (oscarClicks.current >= 3) { oscarClicks.current = 0; setView("admin"); return; }
    oscarTimer.current = setTimeout(() => { oscarClicks.current = 0; }, 1500);
  };

  // ── Computed ──────────────────────────────────────────────────────────────
  const winners      = db.winners || {};
  const savedBallots = db.ballots || {};
  const paidPlayers  = db.paid    || {};
  const maxPossible  = CATEGORIES.length;
  const completedCats = Object.keys(winners).filter(k=>winners[k]).length;

  const calcScore = (ballot) => {
    let score=0, correct=0;
    CATEGORIES.forEach(cat=>{ if(winners[cat.id]&&ballot[cat.id]===winners[cat.id]){score++;correct++;} });
    return {score, correct};
  };

  const leaderboard = Object.entries(savedBallots).map(([name,ballot])=>{
    const {score,correct} = calcScore(ballot);
    return {name,score,correct,filled:Object.keys(ballot).length};
  }).sort((a,b)=>b.score-a.score||b.correct-a.correct);

  const pot     = leaderboard.length * BUY_IN;
  const payouts = PAYOUT_SPLITS[0].splits.map(pct=>({pct,amount:pot*pct/100}));

  // ── Tie-aware prize calculation ─────────────────────────────────
  // If players tie across payout positions, pool those prizes and split equally
  const calcPrizes = () => {
    if (leaderboard.length === 0) return {};
    const prizes = {}; // name -> amount
    const SPLITS = PAYOUT_SPLITS[0].splits; // [60,30,10]
    const payPositions = [0,1,2].filter(i => SPLITS[i] > 0);

    let i = 0;
    while (i < leaderboard.length) {
      const score = leaderboard[i].score;
      // Find all players tied at this score
      let j = i;
      while (j < leaderboard.length && leaderboard[j].score === score) j++;
      const tiedPlayers = leaderboard.slice(i, j); // players at positions i..j-1

      // Find which payout positions these tied players overlap
      const overlappingPositions = payPositions.filter(pos => pos >= i && pos < j);

      if (overlappingPositions.length > 0) {
        // Pool all the prize money for these positions
        const pooled = overlappingPositions.reduce((sum, pos) => sum + (pot * SPLITS[pos] / 100), 0);
        const splitAmount = pooled / tiedPlayers.length;
        tiedPlayers.forEach(p => { prizes[p.name] = splitAmount; });
      }
      i = j;
    }
    return prizes;
  };
  const prizeMap = calcPrizes();

  const iS = {background:"#08080e",border:"1px solid #22200e",color:"#E8E0D0",padding:"11px 14px",borderRadius:8,fontSize:14,outline:"none",fontFamily:"Georgia,serif"};
  const bG = {background:`linear-gradient(135deg,${G},#8a6010)`,border:"none",color:"#070400",padding:"12px 28px",borderRadius:8,cursor:"pointer",fontWeight:"bold",fontSize:14,fontFamily:"Georgia,serif",letterSpacing:0.5};

  const navItems = [
    {id:"home",   label:"Home"},
    {id:"ballot", label:playerName?playerName+"'s Ballot":"My Ballot"},
    {id:"leaderboard", label:"Leaderboard"},
  ];

  if (!configured) return <SetupScreen onSave={saveConfig} />;

  return (
    <div style={{minHeight:"100vh",background:DARK,color:"#E8E0D0",fontFamily:"Georgia,serif",
      backgroundImage:"radial-gradient(ellipse at 10% 0%, #1a1005 0%, transparent 50%), radial-gradient(ellipse at 90% 10%, #0d1020 0%, transparent 50%)"}}>

      {venmoGate && <VenmoGate name={venmoGate} onConfirmed={handleVenmoConfirmed}/>}

      {notification && (
        <div style={{position:"fixed",top:24,left:"50%",transform:"translateX(-50%)",
          background:notification.type==="success"?"#0a1e0a":"#1e0a0a",
          border:`1px solid ${notification.type==="success"?"#3a7a3a":"#7a3a3a"}`,
          color:notification.type==="success"?"#70d070":"#d07070",
          padding:"13px 32px",borderRadius:10,zIndex:9999,fontSize:14,
          boxShadow:"0 8px 32px #00000099",whiteSpace:"nowrap"}}>
          {notification.msg}
        </div>
      )}

      {/* HEADER */}
      <header style={{borderBottom:"1px solid #181408",background:"linear-gradient(180deg,#0b0800 0%,transparent 100%)",padding:"0 24px",position:"sticky",top:0,zIndex:100,backdropFilter:"blur(10px)"}}>
        <div className="header-inner" style={{maxWidth:1140,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",height:70}}>
          <div style={{display:"flex",alignItems:"center",gap:12,cursor:"pointer"}} onClick={()=>setView("home")}>
            <div onClick={e=>{e.stopPropagation();handleOscarClick();}} style={{cursor:"pointer"}}>
              <OscarImg height={52}/>
            </div>
            <div>
              <div style={{fontSize:9,letterSpacing:4,color:G,textTransform:"uppercase",lineHeight:1.3}}>98th Annual Academy Awards</div>
              <div style={{fontSize:16,color:ACCENT,letterSpacing:1.5,fontStyle:"italic"}}>7th Annual Oscars Night in Malibu</div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            {/* Sync indicator */}
            <div style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:"#3a3020"}}>
              {syncing
                ? <div style={{width:8,height:8,borderRadius:"50%",border:"2px solid #C9A84C",borderTopColor:"transparent",animation:"spin 0.8s linear infinite"}}/>
                : <div style={{width:8,height:8,borderRadius:"50%",background: lastSync?"#3a7a3a":"#3a3a2a"}}/>
              }
              <span>{syncing?"Syncing…": lastSync ? "Live ✓" : "Connecting…"}</span>
            </div>
            <nav style={{display:"flex",gap:2}}>
              {navItems.map(tab=>(
                <button key={tab.id} onClick={()=>setView(tab.id)} style={{background:view===tab.id?"#161200":"transparent",border:view===tab.id?"1px solid #C9A84C44":"1px solid transparent",color:view===tab.id?ACCENT:"#5a4a30",padding:"7px 14px",borderRadius:6,cursor:"pointer",fontSize:12,letterSpacing:0.4,transition:"all 0.2s",fontFamily:"Georgia,serif"}}>
                  {tab.label}
                </button>
              ))}
            </nav>
          </div>
        </div>
      </header>

      <main className="main-pad" style={{maxWidth:1140,margin:"0 auto",padding:"40px 24px"}}>

        {/* HOME */}
        {view==="home" && (
          <div>
            <div className="hero-grid" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:0,background:CARD,borderRadius:20,overflow:"hidden",border:"1px solid #201808",boxShadow:"0 0 80px #C9A84C12",marginBottom:40,minHeight:460}}>
              <div className="hero-photo" style={{position:"relative",overflow:"hidden",minHeight:460}}>
                <img src={PHOTO} alt="Oscar Night" style={{width:"100%",height:"100%",objectFit:"cover",display:"block",minHeight:460}}/>
                <div style={{position:"absolute",inset:0,background:"linear-gradient(to right,transparent 55%,#0F0F18 100%),linear-gradient(to top,#07070C66 0%,transparent 35%)"}}/>
                <div style={{position:"absolute",bottom:18,left:18,background:"#00000088",backdropFilter:"blur(8px)",border:"1px solid #C9A84C44",borderRadius:8,padding:"7px 12px",fontSize:11,color:G,letterSpacing:1}}>MARCH 15, 2026 · DOLBY THEATRE</div>
              </div>
              <div className="hero-content" style={{padding:"44px 40px",display:"flex",flexDirection:"column",justifyContent:"space-between"}}>
                <div>
                  <div style={{display:"flex",alignItems:"flex-start",gap:18,marginBottom:22}}>
                    <OscarImg height={110} style={{height:110}} className="hero-oscar-img"/>
                    <div style={{paddingTop:6}}>
                      <div style={{fontSize:10,letterSpacing:4,color:G,textTransform:"uppercase",marginBottom:4,lineHeight:1.5}}>98th Annual Academy Awards</div>
                      <h1 style={{fontSize:28,color:ACCENT,margin:0,letterSpacing:0.5,lineHeight:1.2,fontStyle:"italic",textShadow:"0 0 40px #C9A84C55"}}>7th Annual<br/>Oscars Night<br/>in Malibu</h1>
                    </div>
                  </div>
                  <p style={{color:"#6a5a3a",fontSize:13,lineHeight:1.8,marginBottom:20}}>
                    Pick your winners across all 24 categories. The friend with the most correct wins the pot. Hosted by <span style={{color:ACCENT}}>Conan O'Brien</span>.
                  </p>
                  <div style={{background:"linear-gradient(135deg,#0d0b00,#1a1400)",border:"1px solid #C9A84C44",borderRadius:12,padding:"16px 20px",marginBottom:22}}>
                    <div style={{fontSize:9,letterSpacing:3,color:G,textTransform:"uppercase",marginBottom:10}}>Live Prize Pool · {leaderboard.length} players</div>
                    <div className="prize-pool-row" style={{display:"flex",gap:20,alignItems:"flex-end",flexWrap:"wrap"}}>
                      <div>
                        <div style={{fontSize:11,color:"#4a3a20",marginBottom:2}}>Total Pot</div>
                        <div style={{fontSize:30,color:ACCENT,lineHeight:1}}>${pot}</div>
                        <div style={{fontSize:10,color:"#3a2a10"}}>$30 buy-in · 60/30/10 split</div>
                      </div>
                      <div style={{display:"flex",gap:16}}>
                        {["🥇","🥈","🥉"].map((m,i)=>{
                          const pEntry = leaderboard[i];
                          const tiedAtI = pEntry ? leaderboard.filter(e=>e.score===pEntry.score) : [];
                          const splitAmt = tiedAtI.length > 1
                            ? [0,1,2].filter(p=>tiedAtI.some((_,ti)=>ti+leaderboard.indexOf(pEntry)===p)).reduce((s,p)=>s+payouts[p].amount,0) / tiedAtI.length
                            : payouts[i].amount;
                          return (
                            <div key={i} style={{textAlign:"center"}}>
                              <div style={{fontSize:18}}>{m}</div>
                              <div style={{fontSize:16,color:i===0?ACCENT:"#c8a840"}}>${payouts[i].amount.toFixed(0)}</div>
                              <div style={{fontSize:9,color:"#3a2a10"}}>{PAYOUT_SPLITS[0].splits[i]}%</div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:24,marginBottom:4}}>
                    {[{v:completedCats,t:24,l:"Announced"},{v:leaderboard.length,l:"Players"}].map(s=>(
                      <div key={s.l}>
                        <div style={{fontSize:24,color:ACCENT,lineHeight:1}}>{s.v}{s.t?<span style={{fontSize:14,color:"#2a2010"}}>/{s.t}</span>:""}</div>
                        <div style={{fontSize:10,color:"#4a3a20",letterSpacing:1.5,textTransform:"uppercase",marginTop:3}}>{s.l}</div>
                      </div>
                    ))}
                  </div>
                </div>
                <div style={{marginTop:24}}>
                  <div style={{color:"#4a3a20",fontSize:10,letterSpacing:2.5,textTransform:"uppercase",marginBottom:10}}>Enter Your Name to Begin</div>
                  <div style={{display:"flex",gap:8,marginBottom:10}}>
                    <input value={nameInput} onChange={e=>setNameInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&nameInput&&handleStart(nameInput)} placeholder="Your name..." style={{...iS,flex:1}}/>
                    <button onClick={()=>nameInput&&handleStart(nameInput)} style={bG}>{savedBallots[nameInput]?"Load →":"Start →"}</button>
                  </div>
                  {Object.keys(savedBallots).length>0 && (
                    <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
                      {Object.keys(savedBallots).map(name=>(
                        <button key={name} onClick={()=>{setNameInput(name);handleStart(name);}} style={{background:"#0e0e04",border:"1px solid #222010",color:"#b89840",padding:"5px 12px",borderRadius:5,cursor:"pointer",fontSize:12,fontFamily:"Georgia,serif"}}>{name}</button>
                      ))}
                    </div>
                  )}
                  <div style={{padding:"10px 14px",background:"#08080e",border:"1px solid #1e1c0a",borderRadius:8,fontSize:12,color:"#5a4a28",lineHeight:1.6}}>
                    💳 A <strong style={{color:"#b89840"}}>${BUY_IN} Venmo payment</strong> to <strong style={{color:ACCENT}}>{VENMO}</strong> is required before submitting your ballot.
                  </div>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* BALLOT */}
        {view==="ballot" && (
          <div>
            <div className="ballot-header" style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:28}}>
              <div>
                <h2 style={{color:ACCENT,fontSize:28,margin:0,letterSpacing:1,fontStyle:"italic"}}>{playerName?`${playerName}'s Ballot`:"My Ballot"}</h2>
                <p style={{color:"#4a3a20",margin:"5px 0 0",fontSize:12}}>{Object.keys(picks).length}/{CATEGORIES.length} picked{playerName&&completedCats>0&&` · ${calcScore(picks).score} pts`}</p>
              </div>
              {playerName && <button onClick={saveBallot} disabled={syncing} style={{...bG,opacity:syncing?0.6:1}}>{syncing?"Saving…":"Save Ballot ✓"}</button>}
            </div>
            {!playerName && <div style={{background:"#0c0a00",border:"1px solid #C9A84C33",borderRadius:8,padding:"11px 18px",marginBottom:22,fontSize:12,color:"#a88830"}}>⚠ Enter your name on the Home page to save your picks.</div>}
            <div style={{display:"grid",gap:12}}>
              {CATEGORIES.map(cat=>{
                const winner=winners[cat.id]; const myPick=picks[cat.id];
                const isCorrect=winner&&myPick===winner; const isWrong=winner&&myPick&&myPick!==winner;
                return (
                  <div key={cat.id} style={{background:CARD,borderRadius:11,padding:"16px 20px",border:`1px solid ${isCorrect?"#2a5015":isWrong?"#4a1010":"#181408"}`,boxShadow:isCorrect?"0 0 14px #2a501522":"none"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:11,flexWrap:"wrap",gap:6}}>
                      <span style={{color:G,fontSize:11,fontWeight:"bold",letterSpacing:0.8,textTransform:"uppercase"}}>{cat.name}</span>
                      <div style={{display:"flex",gap:8}}>
                        {winner&&<span style={{color:"#6a5a30",fontSize:11}}>Winner: <span style={{color:"#d4b050"}}>{winner.split(" — ")[0].replace(/^"/,"")}</span></span>}
                        {isCorrect&&<span style={{color:"#50aa30",fontSize:11}}>✓ Correct</span>}
                        {isWrong&&<span style={{color:"#aa4030",fontSize:11}}>✗ Wrong</span>}
                        {myPick&&!winner&&<span style={{color:"#5a4a28",fontSize:11}}>Picked ✓</span>}
                      </div>
                    </div>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                      {cat.nominees.map(nom=>{
                        const isSel=myPick===nom; const isWin=winner===nom;
                        return (
                          <button key={nom} onClick={()=>setPicks(p=>({...p,[cat.id]:nom}))} style={{background:isSel?(isCorrect?"#0e2206":isWrong?"#2a0606":"#100e00"):isWin&&!isSel?"#060e04":"#07070c",border:`${isSel?2:1}px solid ${isSel?(isCorrect?"#50aa30":isWrong?"#aa3030":G):isWin?"#2a5015":"#181408"}`,color:isSel?(isCorrect?"#80d050":isWrong?"#d05050":ACCENT):isWin?"#50aa30":"#5a4a30",padding:"6px 12px",borderRadius:6,cursor:"pointer",fontSize:12,fontFamily:"Georgia,serif",transition:"all 0.12s"}}>
                            {nom.length>50?nom.substring(0,50)+"…":nom}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
            {playerName && <div style={{marginTop:24,textAlign:"center"}}><button onClick={saveBallot} disabled={syncing} style={{...bG,padding:"14px 44px",fontSize:15,opacity:syncing?0.6:1}}>{syncing?"Saving…":"Save Ballot ✓"}</button></div>}
          </div>
        )}

        {/* LEADERBOARD */}
        {view==="leaderboard" && (
          <div>
            <div className="lb-header" style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:12}}>
              <div style={{display:"flex",alignItems:"center",gap:18}}>
                <OscarImg height={60}/>
                <div>
                  <h2 style={{color:ACCENT,fontSize:30,margin:0,letterSpacing:1,fontStyle:"italic"}}>Leaderboard</h2>
                  <p style={{color:"#4a3a20",margin:"3px 0 0",fontSize:12}}>
                    {completedCats} of 24 announced
                    {lastSync && <span> · last sync {lastSync.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",second:"2-digit"})}</span>}
                  </p>
                </div>
              </div>

            </div>

            {/* Prize pool banner */}
            <div style={{background:"linear-gradient(135deg,#0d0b00,#181200)",border:"1px solid #C9A84C44",borderRadius:14,padding:"18px 26px",marginBottom:26,display:"flex",gap:28,alignItems:"center",flexWrap:"wrap"}}>
              <div>
                <div style={{fontSize:10,letterSpacing:3,color:G,textTransform:"uppercase"}}>Prize Pool</div>
                <div style={{fontSize:30,color:ACCENT}}>${pot}</div>
                <div style={{fontSize:10,color:"#3a2a10"}}>{leaderboard.length} players × $30 · 60/30/10</div>
              </div>
              {["🥇","🥈","🥉"].map((m,i)=>{
                if (!payouts[i].pct) return null;
                // Check if this position is part of a tie
                const playersAtPos = leaderboard[i] ? leaderboard.filter(e=>e.score===leaderboard[i].score) : [];
                const isTiedPos = playersAtPos.length > 1 && i < playersAtPos.length + (leaderboard.findIndex(e=>e.name===playersAtPos[0].name));
                return (
                  <div key={i} style={{textAlign:"center"}}>
                    <div style={{fontSize:22}}>{m}</div>
                    <div style={{fontSize:20,color:i===0?ACCENT:"#c8a840"}}>${payouts[i].amount.toFixed(0)}</div>
                    <div style={{fontSize:10,color:"#3a2a10"}}>{payouts[i].pct}%</div>
                  </div>
                );
              })}
            </div>

            {leaderboard.length===0 ? (
              <div style={{background:CARD,border:"1px solid #181408",borderRadius:12,padding:48,textAlign:"center",color:"#4a3a20"}}>No ballots yet — be the first!</div>
            ) : (
              <div style={{display:"grid",gap:9}}>
                {leaderboard.map((entry,i)=>{
                  const pct=maxPossible>0?Math.round((entry.score/maxPossible)*100):0;
                  const medals=["🥇","🥈","🥉"];
                  const prize = prizeMap[entry.name] || null;
                  const isTied = prize !== null && leaderboard.filter(e => e.score === entry.score).length > 1;
                  return (
                    <div key={entry.name} style={{background:i===0?"linear-gradient(135deg,#100d00,#181200)":CARD,border:`1px solid ${i===0?"#C9A84C55":"#181408"}`,borderRadius:12,padding:"16px 22px",boxShadow:i===0?"0 0 28px #C9A84C14":"none",display:"flex",alignItems:"center",gap:16,transition:"all 0.3s"}}>
                      <div style={{fontSize:i<3?28:16,width:36,textAlign:"center"}}>{i<3?medals[i]:`#${i+1}`}</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:17,color:i===0?ACCENT:"#D0C8B8",marginBottom:5,fontWeight:i===0?"bold":"normal"}}>{entry.name}</div>
                        <div style={{height:5,background:"#0a0a0e",borderRadius:3,overflow:"hidden"}}>
                          <div style={{height:"100%",width:`${pct}%`,background:i===0?`linear-gradient(90deg,${G},#e8c840)`:i===1?"#8a7030":i===2?"#5a4a20":"#3a2a14",borderRadius:3,transition:"width 0.6s ease"}}/>
                        </div>
                        <div style={{fontSize:11,color:"#3a2a10",marginTop:3}}>{entry.correct} correct · {entry.filled}/{CATEGORIES.length} filled · {pct}%</div>
                      </div>
                      <div style={{textAlign:"right",minWidth:80}}>
                        <div style={{fontSize:30,color:i===0?ACCENT:i===1?"#d4b050":"#b89030",lineHeight:1,fontWeight:"bold"}}>{entry.score}</div>
                        <div style={{fontSize:11,color:"#3a2a10"}}>/ {maxPossible} pts</div>
                        {prize!==null && <div style={{marginTop:6,background:"#0e0c00",border:`1px solid ${G}44`,borderRadius:6,padding:"3px 10px",fontSize:12,color:G,fontWeight:"bold"}}>${prize.toFixed(0)} 💰</div>}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {/* ADMIN - triple-click Oscar statue */}
        {view==="admin" && (
          <div>
            <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:8}}>
              <OscarImg height={56}/>
              <div>
                <h2 style={{color:ACCENT,fontSize:30,margin:0,letterSpacing:1,fontStyle:"italic"}}>Admin Panel</h2>
                <p style={{color:"#4a3a20",margin:"3px 0 0",fontSize:12}}>Enter winners · triple-click the Oscar statue to access</p>
              </div>
            </div>
            {!adminUnlocked ? (
              <div style={{background:CARD,border:"1px solid #1e1808",borderRadius:14,padding:38,maxWidth:400,marginTop:28}}>
                <div style={{color:"#5a4a30",marginBottom:12,fontSize:13}}>Enter password to unlock</div>
                <div style={{display:"flex",gap:8}}>
                  <input type="password" value={adminPass} onChange={e=>setAdminPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&(adminPass===ADMIN_PASSWORD?setAdminUnlocked(true):showNotif("Wrong password","error"))} placeholder="Password..." style={{...iS,flex:1}}/>
                  <button onClick={()=>adminPass===ADMIN_PASSWORD?setAdminUnlocked(true):showNotif("Wrong password","error")} style={bG}>Unlock</button>
                </div>
                <div style={{color:"#2a1a08",fontSize:10,marginTop:8}}>Default: oscars2026</div>
              </div>
            ) : (
              <AdminWinners winners={winners} onSave={saveWinners} syncing={syncing} completedCats={completedCats} pot={pot} paidCount={Object.keys(paidPlayers).length} bG={bG} G={G} CARD={CARD} ACCENT={ACCENT} />
            )}
          </div>
        )}

      </main>
    </div>
  );
}

// ── Admin winners panel (separated to keep state isolated) ───────────────────
function AdminWinners({ winners, onSave, syncing, completedCats, pot, paidCount, bG, G, CARD, ACCENT }) {
  const [localWinners, setLocalWinners] = useState(winners);
  useEffect(()=>setLocalWinners(winners), [winners]);
  return (
    <div style={{marginTop:28}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:20,alignItems:"center",flexWrap:"wrap",gap:12}}>
        <div>
          <div style={{color:"#4a3a20",fontSize:12,marginBottom:4}}>{completedCats} / 24 winners entered</div>
          <div style={{color:"#5a4a30",fontSize:12}}>💰 {paidCount} payments confirmed · Pot: <span style={{color:ACCENT}}>${pot}</span></div>
        </div>
        <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>{if(window.confirm("Clear ALL winners and start fresh?"))setLocalWinners({});}} style={{background:"#1a0808",border:"1px solid #4a1010",color:"#d07070",padding:"12px 18px",borderRadius:8,cursor:"pointer",fontSize:13,fontFamily:"Georgia,serif"}}>Clear All</button>
                    <button onClick={()=>onSave(localWinners)} disabled={syncing} style={{...bG,opacity:syncing?0.6:1}}>{syncing?"Saving…":"Save All Winners ✓"}</button>
                  </div>
      </div>
      <div style={{display:"grid",gap:10}}>
        {CATEGORIES.map(cat=>(
          <div key={cat.id} style={{background:CARD,border:`1px solid ${localWinners[cat.id]?"#205010":"#181408"}`,borderRadius:10,padding:"13px 17px"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:9}}>
                        <div style={{color:G,fontSize:10,letterSpacing:0.8,textTransform:"uppercase"}}>{cat.name}</div>
                        {localWinners[cat.id]&&<button onClick={()=>setLocalWinners(w=>({...w,[cat.id]:undefined}))} style={{background:"#1a0808",border:"1px solid #4a1010",color:"#d07070",padding:"2px 8px",borderRadius:4,cursor:"pointer",fontSize:10,fontFamily:"Georgia,serif"}}>✕ clear</button>}
                      </div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {cat.nominees.map(nom=>(
                <button key={nom} onClick={()=>setLocalWinners(w=>({...w,[cat.id]:localWinners[cat.id]===nom?undefined:nom}))} style={{background:localWinners[cat.id]===nom?"#0a1e04":"#07070c",border:`1px solid ${localWinners[cat.id]===nom?"#50aa30":"#181408"}`,color:localWinners[cat.id]===nom?"#70d050":"#4a3a20",padding:"5px 11px",borderRadius:5,cursor:"pointer",fontSize:11,fontFamily:"Georgia,serif"}}>
                  {nom.length>52?nom.substring(0,52)+"…":nom}{localWinners[cat.id]===nom&&" ✓"}
                </button>
              ))}
            </div>
          </div>
        ))}
      </div>
      <div style={{marginTop:22,textAlign:"center"}}>
        <button onClick={()=>onSave(localWinners)} disabled={syncing} style={{...bG,padding:"14px 44px",fontSize:15,opacity:syncing?0.6:1}}>{syncing?"Saving…":"Save All Winners ✓"}</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
